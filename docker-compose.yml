services:
  traefik:
    image: traefik:v3.6
    command: ["--configfile=/etc/traefik/traefik.yml"]
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Traefik dashboard (local only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./certs:/certs:ro
    networks: [hubnet]

  postgres:
    image: postgres:16
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [hubnet]

  hub:
    build: ./hub
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [hubnet]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub.rule=Host(`hub.lvh.me`)"
      - "traefik.http.routers.hub.entrypoints=websecure"
      - "traefik.http.routers.hub.tls=true"
      - "traefik.http.services.hub.loadbalancer.server.port=3000"

networks:
  hubnet:

volumes:
  pgdata:
