services:
  traefik:
    image: traefik:v3.6
    # Static config is provided entirely as CLI args (not a configfile) so Compose
    # interpolates ${ACME_EMAIL}. Traefik does NOT expand env vars inside a YAML
    # configfile, and it ignores CLI static-config args when --configfile is set —
    # so the resolver email must come in via args like this.
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=grmcapps_hubnet"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--log.level=INFO"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.dnschallenge=true"
      - "--certificatesresolvers.le.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    environment:
      CF_DNS_API_TOKEN: "${CF_DNS_API_TOKEN}"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Traefik dashboard (local only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - letsencrypt:/letsencrypt
    networks: [hubnet]

  postgres:
    image: postgres:16
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [hubnet]

  hub:
    build: ./hub
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [hubnet]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub.rule=Host(`hub.${BASE_DOMAIN}`)"
      - "traefik.http.routers.hub.entrypoints=websecure"
      - "traefik.http.routers.hub.tls.certresolver=le"
      - "traefik.http.routers.hub.tls.domains[0].main=${BASE_DOMAIN}"
      - "traefik.http.routers.hub.tls.domains[0].sans=*.${BASE_DOMAIN}"
      - "traefik.http.services.hub.loadbalancer.server.port=3000"

  whoami:
    build: ./apps/whoami
    environment:
      WHOAMI_DATABASE_URL: "postgres://${WHOAMI_DB_USER}:${WHOAMI_DB_PASSWORD}@postgres:5432/${WHOAMI_DB_NAME}"
      BASE_DOMAIN: "${BASE_DOMAIN}"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [hubnet]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.${BASE_DOMAIN}`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.middlewares=hub-forward-auth@file"
      - "traefik.http.services.whoami.loadbalancer.server.port=3000"

  social-posts:
    build: ./apps/social-posts
    environment:
      SOCIALPOSTS_DB_USER: "${SOCIALPOSTS_DB_USER}"
      SOCIALPOSTS_DB_PASSWORD: "${SOCIALPOSTS_DB_PASSWORD}"
      SOCIALPOSTS_DB_NAME: "${SOCIALPOSTS_DB_NAME}"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [hubnet]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.social.rule=Host(`social.${BASE_DOMAIN}`)"
      - "traefik.http.routers.social.entrypoints=websecure"
      - "traefik.http.routers.social.tls=true"
      - "traefik.http.routers.social.middlewares=hub-forward-auth@file"
      - "traefik.http.services.social.loadbalancer.server.port=3000"

  approvals:
    build: ./apps/approvals
    environment:
      APPROVALS_DB_USER: "${APPROVALS_DB_USER}"
      APPROVALS_DB_PASSWORD: "${APPROVALS_DB_PASSWORD}"
      APPROVALS_DB_NAME: "${APPROVALS_DB_NAME}"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [hubnet]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.approvals.rule=Host(`approvals.${BASE_DOMAIN}`)"
      - "traefik.http.routers.approvals.entrypoints=websecure"
      - "traefik.http.routers.approvals.tls=true"
      - "traefik.http.routers.approvals.middlewares=hub-forward-auth@file"
      - "traefik.http.services.approvals.loadbalancer.server.port=3000"

networks:
  hubnet:

volumes:
  pgdata:
  letsencrypt:
